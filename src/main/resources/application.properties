# Base Application Configuration
# This file can be committed safely - no sensitive data here
# Use application-dev.properties for local development with sensitive data

spring.application.name=media-store-api
spring.profiles.active=dev
spring.jackson.time-zone=UTC

# Visitor host propagation is handled by VisitorHostFilter, which wraps
# the request based on the X-Visitor-Host / X-Visitor-Proto headers set by
# the edge Worker. We do NOT enable Spring Boot's ForwardedHeaderFilter
# (server.forward-headers-strategy=framework) because Cloud Run mutates
# the standard X-Forwarded-* headers based on the inbound Host before
# Spring sees them, which would re-wrap the request with the wrong
# (run.app) hostname after VisitorHostFilter wrapped it correctly.
# server.forward-headers-strategy=framework

# Public URL of the SPA. The OAuth2 success/failure handlers redirect the
# user-agent here after the OAuth flow completes. In production every
# tenant subdomain is served from the same SPA bundle on this origin
# (Phase A: only the apex initiates OAuth; per-tenant OAuth comes in
# Phase B via a relay-state pattern).
mediastore.frontend.uri=${MEDIASTORE_FRONTEND_URI:https://earnlumens.org}

# Comma-separated CORS allow-list. Empty (default) = only mediastore.frontend.uri.
# Override per-environment via MEDIASTORE_CORS_ALLOWED_ORIGINS env var or
# application-dev.properties. NEVER include dev origins in prod (cookie theft
# risk with AllowCredentials=true). Wildcards are rejected at boot.
mediastore.cors.allowed-origins=${MEDIASTORE_CORS_ALLOWED_ORIGINS:}

#JWT Configuration
mediastore.app.jwtExpirationMs=780000
mediastore.app.jwtRefreshExpirationMs=1814400000

#Cookie Configuration (default for production)
# Empty domain = host-only cookie. Critical for tenant isolation: a session
# opened on acme.earnlumens.org stays on acme.earnlumens.org and is never
# sent to widget.earnlumens.org by the browser. Do NOT set a Domain unless
# you fully understand the cross-tenant implications.
mediastore.sec.cookieDomain=
mediastore.sec.cookieSecure=true
mediastore.sec.cookieName=_rFTo

#Internal cleanup (Cloud Scheduler)
mediastore.internal.cleanupSecret=CHANGE_ME_IN_ENV
mediastore.internal.transcodingSecret=CHANGE_ME_IN_ENV
mediastore.internal.thumbnailSecret=${THUMBNAIL_SECRET:CHANGE_ME_IN_ENV}

#Multi-tenant subdomain resolution
mediastore.tenant.root-domain=${TENANT_ROOT_DOMAIN:earnlumens.org}

#Transcoding pipeline
mediastore.transcoding.max-retries=3
mediastore.transcoding.heartbeat-timeout-seconds=120
mediastore.transcoding.watchdog-interval-ms=30000
mediastore.transcoding.dispatch-batch-size=10
mediastore.transcoding.dispatch-interval-ms=10000
mediastore.transcoding.stale-batch-size=50
mediastore.transcoding.cloud-run-project-id=${CLOUD_RUN_PROJECT_ID:}
mediastore.transcoding.cloud-run-region=${CLOUD_RUN_REGION:europe-west1}
mediastore.transcoding.cloud-run-job-name=${CLOUD_RUN_JOB_NAME:transcode-video}
mediastore.transcoding.callback-base-url=${CALLBACK_BASE_URL:}

#Thumbnail pipeline (image resize on APPROVE — best-effort, original used on failure)
mediastore.thumbnail.max-retries=2
mediastore.thumbnail.heartbeat-timeout-seconds=120
mediastore.thumbnail.watchdog-interval-ms=30000
mediastore.thumbnail.dispatch-batch-size=10
mediastore.thumbnail.dispatch-interval-ms=10000
mediastore.thumbnail.stale-batch-size=50
mediastore.thumbnail.cloud-run-project-id=${CLOUD_RUN_PROJECT_ID:}
mediastore.thumbnail.cloud-run-region=${CLOUD_RUN_REGION:europe-west1}
mediastore.thumbnail.cloud-run-job-name=${THUMBNAIL_CLOUD_RUN_JOB_NAME:thumbnail-process}
mediastore.thumbnail.callback-base-url=${CALLBACK_BASE_URL:}
mediastore.thumbnail.variant-widths=320,640,1280
mediastore.thumbnail.min-shortest-side-px=480

#Moderation pipeline
mediastore.moderation.max-retries=3
mediastore.moderation.heartbeat-timeout-seconds=90
mediastore.moderation.watchdog-interval-ms=15000
mediastore.moderation.dispatch-batch-size=20
mediastore.moderation.dispatch-interval-ms=5000
mediastore.moderation.stale-batch-size=20
mediastore.moderation.dispatch-threads=4
mediastore.moderation.cloud-run-project-id=${CLOUD_RUN_PROJECT_ID:}
mediastore.moderation.cloud-run-region=${CLOUD_RUN_REGION:europe-west1}
mediastore.moderation.cloud-run-job-name=${MODERATION_CLOUD_RUN_JOB_NAME:moderate-content}
mediastore.moderation.callback-base-url=${CALLBACK_BASE_URL:}
mediastore.internal.moderationSecret=${MODERATION_SECRET:CHANGE_ME_IN_ENV}

#ACRCloud (Audio Copyright Detection)
mediastore.acrcloud.host=${ACRCLOUD_HOST:}
mediastore.acrcloud.accessKey=${ACRCLOUD_ACCESS_KEY:}
mediastore.acrcloud.accessSecret=${ACRCLOUD_ACCESS_SECRET:}

#Gemini API (Content Moderation)
mediastore.gemini.apiKey=${GEMINI_API_KEY:}

#Abuse prevention
mediastore.abuse.daily-entry-limit=50
mediastore.abuse.max-concurrent-review=25

#R2 Configuration (Cloudflare R2 – S3-compatible)
mediastore.r2.bucket=multimedia

#Platform payment configuration
platform.wallet=CHANGE_ME_IN_ENV
platform.fee-percent=10.00

#Stellar network configuration
stellar.horizon-url=https://horizon.stellar.org
stellar.network-passphrase=Public Global Stellar Network ; September 2015
stellar.tx-timeout-seconds=300

# OAuth2 X (Twitter) Common Configuration
spring.security.oauth2.client.registration.x.provider=x
spring.security.oauth2.client.registration.x.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.x.redirect-uri={baseUrl}/login/oauth2/code/x
spring.security.oauth2.client.registration.x.scope=users.read,tweet.read
spring.security.oauth2.client.registration.x.client-authentication-method=client_secret_basic

spring.security.oauth2.client.provider.x.authorization-uri=https://x.com/i/oauth2/authorize
spring.security.oauth2.client.provider.x.token-uri=https://api.x.com/2/oauth2/token
spring.security.oauth2.client.provider.x.user-info-uri=https://api.x.com/2/users/me?user.fields=profile_image_url,public_metrics
spring.security.oauth2.client.provider.x.user-name-attribute=username